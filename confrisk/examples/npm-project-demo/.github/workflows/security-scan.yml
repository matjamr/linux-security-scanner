name: Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  confrisk-npm-scan:
    name: NPM Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build confrisk-npm
        run: |
          cd ../../..
          cargo build --release --bin confrisk-npm
          sudo cp target/release/confrisk-npm /usr/local/bin/

      - name: Run confrisk-npm scan
        run: |
          confrisk-npm \
            --path . \
            --asset production \
            --fail-on high \
            --exit-code \
            --format json > security-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json
          retention-days: 30

      - name: Check for critical/high vulnerabilities
        run: |
          confrisk-npm \
            --path . \
            --asset production \
            --fail-on high \
            --exit-code

      - name: Comment PR with results (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('security-report.json', 'utf8'));

            const critical = report.filter(f => !f.passed && f.risk_band === 'critical').length;
            const high = report.filter(f => !f.passed && f.risk_band === 'high').length;
            const medium = report.filter(f => !f.passed && f.risk_band === 'medium').length;

            const comment = `## 🔒 Security Scan Results

            - 🔴 Critical: ${critical}
            - 🟠 High: ${high}
            - 🟡 Medium: ${medium}

            ${critical + high > 0 ? '❌ Action required: Fix critical/high vulnerabilities' : '✅ No critical/high vulnerabilities found'}

            <details>
            <summary>View full report</summary>

            \`\`\`json
            ${JSON.stringify(report, null, 2)}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
